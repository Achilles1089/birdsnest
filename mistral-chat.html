<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mistral Small — Local Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --bg2: #12121a;
            --bg3: #1a1a28;
            --border: #2a2a3a;
            --text: #e8e8f0;
            --text-dim: #8888aa;
            --accent: #f97316;
            --accent2: #fb923c;
            --user-bg: rgba(249, 115, 22, 0.08);
            --user-border: rgba(249, 115, 22, 0.2);
            --ai-bg: rgba(100, 100, 140, 0.06);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 14px 24px;
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        header .logo {
            font-size: 24px;
        }

        header h1 {
            font-size: 16px;
            font-weight: 600;
        }

        header .badge {
            font-size: 11px;
            background: rgba(249, 115, 22, 0.15);
            color: var(--accent);
            padding: 3px 8px;
            border-radius: 6px;
            font-weight: 500;
        }

        header .status {
            margin-left: auto;
            font-size: 11px;
            color: var(--text-dim);
        }

        header .status .dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            background: #22c55e;
            border-radius: 50%;
            margin-right: 5px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.4
            }
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .msg {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 14px;
            font-size: 14px;
            line-height: 1.65;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .msg.user {
            align-self: flex-end;
            background: var(--user-bg);
            border: 1px solid var(--user-border);
            border-bottom-right-radius: 4px;
        }

        .msg.ai {
            align-self: flex-start;
            background: var(--ai-bg);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        .msg .label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            display: block;
        }

        .msg.user .label {
            color: var(--accent);
        }

        .msg.ai .label {
            color: var(--text-dim);
        }

        .msg .stats {
            font-size: 10px;
            color: var(--text-dim);
            margin-top: 8px;
            font-family: 'SF Mono', monospace;
        }

        .typing-indicator {
            display: inline-flex;
            gap: 4px;
            padding: 4px 0;
        }

        .typing-indicator span {
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.15s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.3s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: translateY(0)
            }

            40% {
                transform: translateY(-6px)
            }
        }

        #input-area {
            padding: 16px 24px;
            background: var(--bg2);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }

        #input-area textarea {
            flex: 1;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            resize: none;
            min-height: 44px;
            max-height: 120px;
            outline: none;
            transition: border-color 0.2s;
        }

        #input-area textarea:focus {
            border-color: var(--accent);
        }

        #input-area button {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            border-radius: 12px;
            padding: 0 20px;
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        #input-area button:hover {
            opacity: 0.9;
        }

        #input-area button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        #messages::-webkit-scrollbar {
            width: 6px;
        }

        #messages::-webkit-scrollbar-track {
            background: transparent;
        }

        #messages::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }
    </style>
</head>

<body>
    <header>
        <span class="logo">🔥</span>
        <h1>Mistral Small 3.1</h1>
        <span class="badge">24B • Local</span>
        <span class="status"><span class="dot"></span>Ollama</span>
    </header>

    <div id="messages"></div>

    <div id="input-area">
        <textarea id="prompt" rows="1" placeholder="Message Mistral..." autofocus></textarea>
        <button id="send" onclick="sendMessage()">Send</button>
    </div>

    <script>
        const messagesEl = document.getElementById('messages');
        const promptEl = document.getElementById('prompt');
        const sendBtn = document.getElementById('send');
        const MODEL = 'mistral-small';
        const OLLAMA = 'http://127.0.0.1:11434';

        let history = [];
        let generating = false;

        // Auto-grow textarea
        promptEl.addEventListener('input', () => {
            promptEl.style.height = 'auto';
            promptEl.style.height = Math.min(promptEl.scrollHeight, 120) + 'px';
        });

        // Enter to send, Shift+Enter for newline
        promptEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        function addMessage(role, content, stats) {
            const div = document.createElement('div');
            div.className = `msg ${role === 'user' ? 'user' : 'ai'}`;
            const label = role === 'user' ? 'You' : '🔥 Mistral';
            div.innerHTML = `<span class="label">${label}</span><span class="content">${escapeHtml(content)}</span>`;
            if (stats) {
                div.innerHTML += `<div class="stats">${stats}</div>`;
            }
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
            return div;
        }

        function escapeHtml(text) {
            return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        async function sendMessage() {
            const text = promptEl.value.trim();
            if (!text || generating) return;

            generating = true;
            sendBtn.disabled = true;
            promptEl.value = '';
            promptEl.style.height = 'auto';

            addMessage('user', text);
            history.push({ role: 'user', content: text });

            // Create AI message with typing indicator
            const aiDiv = document.createElement('div');
            aiDiv.className = 'msg ai';
            aiDiv.innerHTML = `<span class="label">🔥 Mistral</span><span class="content"><span class="typing-indicator"><span></span><span></span><span></span></span></span>`;
            messagesEl.appendChild(aiDiv);
            messagesEl.scrollTop = messagesEl.scrollHeight;

            const contentEl = aiDiv.querySelector('.content');
            let fullText = '';
            const t0 = Date.now();

            try {
                const res = await fetch(`${OLLAMA}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: MODEL,
                        messages: history,
                        stream: true,
                    }),
                });

                const reader = res.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const lines = decoder.decode(value).split('\n').filter(Boolean);
                    for (const line of lines) {
                        try {
                            const data = JSON.parse(line);
                            if (data.message && data.message.content) {
                                fullText += data.message.content;
                                contentEl.textContent = fullText;
                                messagesEl.scrollTop = messagesEl.scrollHeight;
                            }
                            if (data.done && data.eval_count) {
                                const elapsed = ((Date.now() - t0) / 1000).toFixed(1);
                                const tokSec = (data.eval_count / (data.eval_duration / 1e9)).toFixed(1);
                                aiDiv.innerHTML += `<div class="stats">${data.eval_count} tokens • ${tokSec} tok/s • ${elapsed}s</div>`;
                            }
                        } catch (_) { }
                    }
                }

                history.push({ role: 'assistant', content: fullText });
            } catch (e) {
                contentEl.textContent = `Error: ${e.message}. Is Ollama running?`;
            }

            generating = false;
            sendBtn.disabled = false;
            promptEl.focus();
        }
    </script>
</body>

</html>
